name: 'Python: Publish package'

on:
  workflow_dispatch:
  push:
    paths:
      - 'ffi/blsct.i'
      - 'ffi/python/**'
      - '.github/workflows/python-publish-pkg.yml'
  pull_request:
    paths:
      - 'ffi/blsct.i'
      - 'ffi/python/**'
      - '.github/workflows/python-publish-pkg.yml'


jobs:
  build:
    strategy:
      matrix:
        os: ['ubuntu-24.04', 'macos-15']
        python-version: ['3.12']

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: pip install cibuildwheel

      - name: Install system dependencies
        run: |
          if [[ $RUNNER_OS == 'Linux' ]]; then
            sudo apt-get update && sudo apt-get install -y swig autoconf automake libtool pkg-config
          elif [[ $RUNNER_OS == 'macOS' ]]; then
            brew install swig autoconf automake libtool pkg-config
          fi

      - name: Copy shared blsct.i into python package tree
        run: cp ffi/blsct.i ffi/python/blsct.i

      - name: Build wheels with cibuildwheel
        run: |
          cd ffi/python
          if [ "${{ matrix.python-version }}" = "3.12" ]; then
            export CIBW_BUILD="cp312-*"
          elif [ "${{ matrix.python-version }}" = "3.13" ]; then
            export CIBW_BUILD="cp313-*"
          fi
          cibuildwheel --output-dir wheelhouse

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ffi/python/wheelhouse/*.whl

  verify:
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-pattern: wheels-ubuntu-24.04-*
          - os: macos-15
            artifact-pattern: wheels-macos-15-*
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ matrix.artifact-pattern }}
          merge-multiple: true
          path: wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Smoke test wheel
        run: |
          pip install wheelhouse/*.whl
          python -c "from blsct import get_chain; print(get_chain())"

  publish:
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install twine
        run: pip install twine

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload wheelhouse/*.whl
