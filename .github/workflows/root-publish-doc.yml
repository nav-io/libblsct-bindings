name: 'Root: Publish doc website'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/root-publish-doc.yml'

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write


jobs:
  root-publish-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material mdx-truly-sane-lists

      - name: Sync root README into docs home
        run: cp README.md docs/src/index.md

      - name: Verify placeholder was replaced
        run: |
          if grep -q "Documentation Placeholder" docs/src/index.md; then
            echo "ERROR: docs/src/index.md still contains placeholder text"
            exit 1
          fi

      - name: Build documentation
        run: |
          cd docs
          mkdocs build

      - name: Deploy root docs to /
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/site
          publish_branch: gh-pages
          keep_files: true
